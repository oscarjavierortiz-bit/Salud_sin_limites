<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso Profesionales | Salud Sin Límites</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --blue: #1A3A8F;
      --blue-dark: #0f2260;
      --blue-light: #2B5FD9;
      --red: #E8433A;
      --red-light: #f05c55;
      --white: #ffffff;
      --gray-50: #f8f9fb;
      --gray-100: #eef0f5;
      --gray-200: #d6dae6;
      --gray-600: #5a6380;
      --gray-800: #1e2340;
      --font-display: 'Oswald', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      font-family: var(--font-body);
      background-color: var(--gray-50);
      background-image: radial-gradient(circle at 20% 30%, rgba(26, 58, 143, 0.05) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(232, 67, 58, 0.05) 0%, transparent 40%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      color: var(--gray-800);
    }

    .login-container {
      background-color: var(--white);
      padding: 3rem;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(15, 34, 96, 0.12);
      width: 100%;
      max-width: 420px;
      border-top: 5px solid var(--red);
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-header h2 {
      font-family: var(--font-display);
      color: var(--blue-dark);
      font-size: 2rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 0 0 0.5rem 0;
    }

    .login-header p {
      color: var(--gray-600);
      font-weight: 500;
      margin: 0;
    }

    .tabs {
      display: flex;
      margin-bottom: 2rem;
      background: var(--gray-100);
      border-radius: 8px;
      padding: 4px;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px;
      cursor: pointer;
      font-weight: 600;
      color: var(--gray-600);
      transition: all 0.3s;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .tab.active {
      color: var(--blue-dark);
      background: var(--white);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--blue-dark);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid var(--gray-100);
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
      font-family: var(--font-body);
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--blue-light);
    }

    .password-container {
      position: relative;
    }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--gray-600);
      font-size: 1.2rem;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background-color: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      font-family: var(--font-body);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 0.5rem;
    }

    .btn-login:hover {
      background-color: var(--blue-dark);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(26, 58, 143, 0.2);
    }

    .error-message {
      background: #fff5f5;
      color: var(--red);
      padding: 10px;
      border-radius: 6px;
      border-left: 4px solid var(--red);
      text-align: center;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      font-weight: 500;
      display: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 2rem;
      color: var(--blue-light);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: var(--red);
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="login-header">
      <h2>Salud Sin Límites</h2>
      <p>Acceso a Profesionales</p>
    </div>

    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Iniciar Sesión</div>
      <div class="tab" id="tabRegister" onclick="switchTab('register')">Registrarse</div>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <!-- Formulario de Login -->
    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="loginUsername">Usuario</label>
        <input type="text" id="loginUsername" required>
      </div>
      <div class="form-group">
        <label for="loginPassword">Contraseña</label>
        <div class="password-container">
          <input type="password" id="loginPassword" required>
          <button type="button" class="toggle-password" onclick="toggleVisibility('loginPassword', 'eyeIconLogin')">
            <span id="eyeIconLogin">👁️</span>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">Ingresar</button>
    </form>

    <!-- Formulario de Registro -->
    <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
      <div class="form-group">
        <label for="registerUsername">Nuevo Usuario</label>
        <input type="text" id="registerUsername" required>
      </div>
      <div class="form-group">
        <label for="registerPassword">Contraseña</label>
        <div class="password-container">
          <input type="password" id="registerPassword" required>
          <button type="button" class="toggle-password" onclick="toggleVisibility('registerPassword', 'eyeIconReg')">
            <span id="eyeIconReg">👁️</span>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <div class="password-container">
          <input type="password" id="confirmPassword" required>
          <button type="button" class="toggle-password" onclick="toggleVisibility('confirmPassword', 'eyeIconConf')">
            <span id="eyeIconConf">👁️</span>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login">Crear Cuenta</button>
    </form>

    <a href="index.html" class="back-link">← Volver al Inicio</a>
  </div>

  <script>
    // Inicializar Supabase
    const SUPABASE_URL = 'https://tfnkttndirngwndzndbj.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KFrHhQ0wyhX8RZ9UlcMxHA_IQrwOu67';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function toggleVisibility(inputId, iconId) {
      const input = document.getElementById(inputId);
      const icon = document.getElementById(iconId);
      if (input.type === "password") {
        input.type = "text";
        icon.textContent = "🙈";
      } else {
        input.type = "password";
        icon.textContent = "👁️";
      }
    }

    function switchTab(tab) {
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');
      const tabLogin = document.getElementById('tabLogin');
      const tabRegister = document.getElementById('tabRegister');
      const errorMessage = document.getElementById('errorMessage');

      errorMessage.style.display = 'none';

      if (tab === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        tabLogin.classList.add('active');
        tabRegister.classList.remove('active');
      } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        tabLogin.classList.remove('active');
        tabRegister.classList.add('active');
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMessage');
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function handleLogin(e) {
      e.preventDefault();
      const user = document.getElementById('loginUsername').value;
      const pass = document.getElementById('loginPassword').value;

      try {
        const { data, error } = await supabaseClient
          .from('admin_users')
          .select('*')
          .eq('username', user)
          .eq('password', pass)
          .maybeSingle();

        if (error || !data) {
          showError('Usuario o contraseña incorrectos.');
        } else {
          // Redirigir al panel de administración
          localStorage.setItem('adminAuthenticated', 'true');
          window.location.href = 'admin-panel.html';
        }
      } catch (err) {
        showError('Error de conexión con la base de datos.');
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const user = document.getElementById('registerUsername').value;
      const pass = document.getElementById('registerPassword').value;
      const confPass = document.getElementById('confirmPassword').value;

      if (pass !== confPass) {
        showError('Las contraseñas no coinciden.');
        return;
      }

      try {
        // Verificar si el usuario ya existe
        const { data: existingUser } = await supabaseClient
          .from('admin_users')
          .select('*')
          .eq('username', user)
          .maybeSingle();

        if (existingUser) {
          showError('El nombre de usuario ya está registrado.');
          return;
        }

        // Crear nuevo usuario
        const { error } = await supabaseClient
          .from('admin_users')
          .insert([{ username: user, password: pass }]);

        if (error) {
          showError('Error al registrar el usuario.');
        } else {
          alert('Usuario registrado exitosamente. Ahora puede iniciar sesión.');
          switchTab('login');
        }
      } catch (err) {
        showError('Error de conexión.');
      }
    }
  </script>

</body>

</html>
